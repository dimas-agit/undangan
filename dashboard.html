<!doctype html>
<html lang="en" data-bs-theme="auto">

<head>
    <!-- Common -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Dashboard Ulems">
    <title>Dashboard Ulems</title>

    <!-- Appearance -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Dashboard Ulems">
    <meta name="theme-color" content="#f8f9fa">
    <meta name="color-scheme" content="dark light">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" sizes="192x192" href="https://ulems.my.id/assets/images/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="https://ulems.my.id/assets/images/icon-192x192.png">

    <!-- Preconnect CDN -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">

    <!-- Preload Resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap" as="style">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha256-2FMn2Zx6PuH5tdBQDRNwrOo60ts5wWPC9R8jK67b3t4=" crossorigin="anonymous" as="style">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css"
        integrity="sha256-4rTIfo5GQTi/7UJqoyUJQKzxW8VN/YBH31+Cy+vTZj4=" crossorigin="anonymous" as="style">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha256-5P1JGBOIxI7FBAvT/mb1fCnI5n/NhQKzNUuW7Hq0fMc=" crossorigin="anonymous" as="script">

    <!-- Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap">

    <!-- Dependencies CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha256-2FMn2Zx6PuH5tdBQDRNwrOo60ts5wWPC9R8jK67b3t4=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css"
        integrity="sha256-4rTIfo5GQTi/7UJqoyUJQKzxW8VN/YBH31+Cy+vTZj4=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@eonasdan/tempus-dominus@6.9.4/dist/css/tempus-dominus.min.css">
    <link rel="stylesheet" href="./css/admin.css">

    <!-- Dependencies JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha256-5P1JGBOIxI7FBAvT/mb1fCnI5n/NhQKzNUuW7Hq0fMc=" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@eonasdan/tempus-dominus@6.9.4/dist/js/tempus-dominus.min.js"></script>
    <script src="./dist/admin.js"></script>
</head>

<!-- <html lang="en" data-bs-theme="auto"> ['auto', 'dark', 'light'] -->

<body data-url="http://localhost:8000/">

    <!-- Nav bottom -->
    <nav class="navbar navbar-expand fixed-bottom rounded-top-4 border-top d-md-none d-lg-none d-xl-none p-0">
        <ul class="navbar-nav nav-justified w-100 align-items-center">
            <li class="nav-item">
                <button class="nav-link active" onclick="undangan.admin.navbar.buttonNavHome(this)">
                    <i class="fa-solid fa-house"></i>
                    <span class="d-block" style="font-size: 0.7rem;">Home</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="undangan.admin.navbar.buttonNavSetting(this)">
                    <i class="fa-solid fa-gear"></i>
                    <span class="d-block" style="font-size: 0.7rem;">Setting</span>
                </button>
            </li>
        </ul>
    </nav>

    <!-- Main -->
    <main class="container mt-4 mb-5">

        <!-- Header -->
        <div class="d-none d-sm-flex justify-content-between align-items-center mt-4 mb-5 pt-1">
            <h4 class="m-0 p-0 flex-grow-1 fw-bold">Undangan<i class="fa-solid fa-fire text-danger ms-2"></i></h4>
            <div class="m-0 p-0 flex-grow-1 text-end" id="dashboard-name" style="font-size: 1.4rem;">
                <div class="placeholder-wave">
                    <span class="placeholder col-6 rounded-4"></span>
                </div>
            </div>
        </div>

        <!-- Body -->
        <div class="row m-0 p-0">

            <!-- Menu -->
            <div class="col-md-3 d-none d-md-block m-0 p-0">
                <ul class="nav flex-column w-100 nav-pills pe-4" role="tablist">
                    <li class="nav-item pe-2" role="presentation">
                        <button
                            class="btn-theme-auto nav-link w-100 text-start fw-semibold mb-1 rounded-4 shadow-sm active"
                            data-bs-toggle="pill" data-bs-target="#pills-home" id="button-home" type="button" role="tab"
                            aria-controls="pills-home" aria-selected="true">
                            <i class="fa-solid fa-house ms-3 me-2"></i>Home
                        </button>
                    </li>
                    <li class="nav-item pe-2" role="presentation">
                        <button class="btn-theme-auto nav-link w-100 text-start fw-semibold mb-1 rounded-4 shadow-sm"
                            data-bs-toggle="pill" data-bs-target="#pills-invitation" id="button-invitation"
                            type="button" role="tab" aria-controls="pills-invitation" aria-selected="true">
                            <i class="fa-solid fa-envelope ms-3 me-2"></i>Invitation
                        </button>
                    </li>
                    <li class="nav-item pe-2" role="presentation">
                        <button class="btn-theme-auto nav-link w-100 text-start fw-semibold my-1 rounded-4 shadow-sm"
                            data-bs-toggle="pill" data-bs-target="#pills-setting" id="button-setting" type="button"
                            role="tab" aria-controls="pills-setting" aria-selected="false">
                            <i class="fa-solid fa-gear ms-3 me-2"></i>Setting
                        </button>
                    </li>
                    <li class="nav-item pe-2" role="presentation">
                        <hr class="my-2" aria-hidden="true">
                    </li>
                    <li class="nav-item pe-2" role="presentation">
                        <button
                            class="btn-theme-auto logout nav-link w-100 text-start fw-semibold mt-1 rounded-4 shadow-sm"
                            onclick="undangan.admin.logout()" type="button" role="tab" aria-selected="false">
                            <i class="fa-solid fa-right-from-bracket ms-3 me-2"></i>Logout
                        </button>
                    </li>
                </ul>
            </div>

            <!-- Content -->
            <div class="col-md-9 m-0 p-0">
                <div class="tab-content">

                    <!-- Home -->
                    <section class="tab-pane fade show active" id="pills-home" role="tabpanel" tabindex="0">

                        <!-- Sub Header -->
                        <div class="rounded-4 p-2 mb-4 shadow" style="background-color: var(--bs-gray-200)">
                            <div class="d-flex justify-content-between">
                                <h5 class="fw-bold my-1 ms-0 p-0" style="color: var(--bs-gray-900); font-size: 1rem;"><i
                                        class="fa-solid fa-home mx-2"></i>Home</h5>
                                <div class="d-flex">
                                    <button class="btn btn-success rounded-3 btn-sm shadow-sm my-0 ms-0 me-2 pb-0"
                                        onclick="undangan.admin.download(this)" data-offline-disabled="false"
                                        aria-label="Download comment">
                                        <i class="fa-solid fa-download"></i><span
                                            class="d-none d-sm-inline ms-2">Download</span>
                                    </button>
                                    <button class="btn btn-secondary rounded-3 btn-sm shadow-sm m-0 pb-0"
                                        onclick="undangan.theme.change()" aria-label="Change theme">
                                        <i class="fa-solid fa-circle-half-stroke"></i><span
                                            class="d-none d-sm-inline ms-2">Theme</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Stats -->
                        <div class="row">
                            <div class="col col-xl-3 col-6 mb-3">
                                <div class="rounded-4 shadow p-3 border-0" style="background: #8573F1;">
                                    <div class="row align-items-center" style="color: var(--bs-gray-100);">
                                        <div class="col-9">
                                            <p class="fw-bold m-0 p-0">Comments</p>
                                            <div class="fw-bold m-0 p-0" id="count-comment">
                                                <div class="placeholder-wave">
                                                    <span class="placeholder col-8 rounded-3"></span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-3 p-0">
                                            <div class="d-block d-sm-none">
                                                <i class="fa-solid fa-comments me-2" style="font-size: 1.5rem;"></i>
                                            </div>
                                            <div class="d-none d-sm-block d-md-block d-lg-block d-xl-block">
                                                <i class="fa-solid fa-comments fa-2xl me-2"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col col-xl-3 col-6 mb-3">
                                <div class="rounded-4 shadow p-3 border-0" style="background: #7A5CD9;">
                                    <div class="row align-items-center" style="color: var(--bs-gray-100);">
                                        <div class="col-9">
                                            <p class="fw-bold m-0 p-0">Present</p>
                                            <div class="fw-bold m-0 p-0" id="count-present">
                                                <div class="placeholder-wave">
                                                    <span class="placeholder col-8 rounded-3"></span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-3 p-0">
                                            <div class="d-block d-sm-none">
                                                <i class="fa-solid fa-circle-check me-2" style="font-size: 1.5rem;"></i>
                                            </div>
                                            <div class="d-none d-sm-block d-md-block d-lg-block d-xl-block">
                                                <i class="fa-solid fa-circle-check fa-2xl me-2"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col col-xl-3 col-6 mb-3">
                                <div class="rounded-4 shadow p-3 border-0" style="background: #6546B1;">
                                    <div class="row align-items-center" style="color: var(--bs-gray-100);">
                                        <div class="col-9">
                                            <p class="fw-bold m-0 p-0">Absent</p>
                                            <div class="fw-bold m-0 p-0" id="count-absent">
                                                <div class="placeholder-wave">
                                                    <span class="placeholder col-8 rounded-3"></span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-3 p-0">
                                            <div class="d-block d-sm-none">
                                                <i class="fa-solid fa-circle-xmark me-2" style="font-size: 1.5rem;"></i>
                                            </div>
                                            <div class="d-none d-sm-block d-md-block d-lg-block d-xl-block">
                                                <i class="fa-solid fa-circle-xmark fa-2xl me-2"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col col-xl-3 col-6 mb-3">
                                <div class="rounded-4 shadow p-3 border-0" style="background: #4F3392;">
                                    <div class="row align-items-center" style="color: var(--bs-gray-100);">
                                        <div class="col-9">
                                            <p class="fw-bold m-0 p-0">Likes</p>
                                            <div class="fw-bold m-0 p-0" id="count-like">
                                                <div class="placeholder-wave">
                                                    <span class="placeholder col-8 rounded-3"></span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-3 p-0">
                                            <div class="d-block d-sm-none">
                                                <i class="fa-solid fa-heart me-2" style="font-size: 1.5rem;"></i>
                                            </div>
                                            <div class="d-none d-sm-block d-md-block d-lg-block d-xl-block">
                                                <i class="fa-solid fa-heart fa-2xl me-2"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mt-2">
                            <div class="col-lg-6 col-12">
                                <!-- Form -->
                                <div class="bg-theme-auto p-3 mb-3 rounded-4 shadow">
                                    <div class="d-block" id="comment-form-default">
                                        <label for="form-comment" class="form-label fw-bold my-1"><i
                                                class="fa-solid fa-comment me-2"></i>Comment</label>

                                        <div class="position-relative">
                                            <button
                                                class="btn btn-secondary btn-sm rounded-4 shadow-sm me-1 my-1 position-absolute bottom-0 end-0"
                                                onclick="undangan.comment.gif.open(undangan.comment.gif.default)"
                                                aria-label="button gif" data-offline-disabled="false"><i
                                                    class="fa-solid fa-photo-film"></i></button>
                                            <textarea dir="auto" class="form-control shadow-sm mb-3 rounded-4"
                                                id="form-comment" name="form-comment" rows="3" minlength="1"
                                                maxlength="1000" placeholder="Type to comment"
                                                data-offline-disabled="false"></textarea>
                                        </div>
                                    </div>

                                    <div class="d-none mb-3" id="gif-form-default"></div>

                                    <div class="d-flex justify-content-end mb-0">
                                        <button onclick="undangan.comment.send(this)"
                                            class="btn btn-primary btn-sm rounded-4 shadow-sm"
                                            data-offline-disabled="false"><i
                                                class="fa-solid fa-paper-plane me-2"></i>Send</button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-lg-6 col-12">
                                <!-- Comments -->
                                <div class="mb-2" id="comments" data-loading="false"></div>

                                <!-- Pagination -->
                                <nav class="d-flex d-none justify-content-center py-3 mb-4" id="pagination"></nav>
                            </div>
                        </div>
                    </section>

                    <!-- Invitation -->
                    <section class="tab-pane fade" id="pills-invitation" role="tabpanel" tabindex="0">

                        <!-- Sub Header -->
                        <div class="rounded-4 p-2 mb-4 shadow" style="background-color: var(--bs-gray-200)">
                            <h5 class="fw-bold my-1 ms-0 p-0" style="color: var(--bs-gray-900); font-size: 1rem;"><i
                                    class="fa-solid fa-envelope mx-2"></i>Invitation</h5>
                        </div>
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-user me-2"></i>Informasi
                                Pernikahan</p>
                            <form>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Pilih User</label>

                                        <select class="form-select form-select-sm rounded-4 shadow-sm select2" id="user_id" name="user_id"
                                            aria-label="Pilih user">
                                        
                                        </select>   
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Mempelai Pria</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm" id="groom_name"
                                            placeholder="Masukkan nama mempelai pria & gelarnya" minlength="2"
                                            maxlength="50" name="groom_name" oninput="undangan.admin.enableButtonName()"
                                            autocomplete="name" data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Putra ke-</label>

                                        <input dir="auto" type="number"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="groom_child_order" placeholder="Masukkan putra ke-" minlength="2"
                                            maxlength="50" name="groom_name" oninput="undangan.admin.enableButtonName()"
                                            autocomplete="name" data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Nama Ayah pria</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="groom_father_name" placeholder="Masukkan nama ayah pria & gelarnya"
                                            minlength="2" maxlength="50" name="groom_father_name"
                                            oninput="undangan.admin.enableButtonName()" autocomplete="name"
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Nama Ibu pria</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="groom_mother_name" placeholder="Masukkan nama ibu pria & gelarnya"
                                            minlength="2" maxlength="50" name="groom_mother_name"
                                            oninput="undangan.admin.enableButtonName()" autocomplete="name"
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Mempelai Wanita</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm" id="bride_name"
                                            placeholder="Masukkan nama mempelai wanita & gelarnya" minlength="2"
                                            maxlength="50" name="bride_name" oninput="undangan.admin.enableButtonName()"
                                            autocomplete="name" data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Putri ke-</label>

                                        <input dir="auto" type="number"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="bride_child_order" placeholder="Masukkan putri ke-" minlength="2"
                                            maxlength="50" name="bride_child_order"
                                            oninput="undangan.admin.enableButtonName()" autocomplete="name"
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Nama Ayah wanita</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="bride_father_name" placeholder="Masukkan nama ayah wanita & gelarnya"
                                            minlength="2" maxlength="50" name="bride_father_name"
                                            oninput="undangan.admin.enableButtonName()" autocomplete="name"
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Nama Ibu wanita</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="bride_mother_name" placeholder="Masukkan nama ibu wanita & gelarnya"
                                            minlength="2" maxlength="50" name="bride_mother_name"
                                            oninput="undangan.admin.enableButtonName()" autocomplete="name"
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Tanggal & Waktu Pernikahan</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="wedding_date" placeholder="Masukkan tanggal & waktu pernikahan"
                                            minlength="2" maxlength="50" name="wedding_date" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                   <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Waktu Akad</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="akad_time" placeholder="Masukkan waktu akad"
                                            minlength="2" maxlength="50" name="akad_time" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                  <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Waktu Resepsi</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="reception_time" placeholder="Masukkan waktu resepsi"
                                            minlength="2" maxlength="50" name="reception_time" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                 <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Lokasi Map</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="location_map" placeholder="Masukkan lokasi google map"
                                            minlength="2" maxlength="50" name="location_map" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                 <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Alamat lengkap</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="address" placeholder="Masukkan alamat lengkap map"
                                            minlength="2" maxlength="50" name="address" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>

                                <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Slug Url</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="slug" placeholder="Masukkan slug"
                                            minlength="2" maxlength="50" name="slug" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                  <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Music Url</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="music_url" placeholder="Masukkan URL music"
                                            minlength="2" maxlength="50" name="music_url" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                 <div class="mb-3">
                                    <div class="form-group">
                                        <label for="form-name" class="ms-2">Cover Image Url</label>

                                        <input dir="auto" type="text"
                                            class="form-control form-control-sm rounded-4 shadow-sm"
                                            id="cover_image_url" placeholder="Masukkan URL cover image"
                                            minlength="2" maxlength="50" name="cover_image" 
                                            data-offline-disabled="false">
                                    </div>

                                </div>
                                <div class="mb-3">
                                    <div class="form-group">
                                        <button type="button" class="btn btn-primary rounded-4 shadow-sm" id="button-save-invitation"
                                            onclick="undangan.invitation.saveInvitation(this)"
                                            data-offline-disabled="false"><i class="fa-solid fa-floppy-disk me-2"></i>Save</button>
                                    </div>
                            </form>
                        </div>

                    </section>

                    <!-- Setting -->
                    <section class="tab-pane fade" id="pills-setting" role="tabpanel" tabindex="0">

                        <!-- Sub Header -->
                        <div class="rounded-4 p-2 mb-4 shadow" style="background-color: var(--bs-gray-200)">
                            <h5 class="fw-bold my-1 ms-0 p-0" style="color: var(--bs-gray-900); font-size: 1rem;"><i
                                    class="fa-solid fa-gear mx-2"></i>Setting</h5>
                        </div>

                        <!-- Email -->
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-envelope me-2"></i>Email</p>
                            <p class="m-0 p-0" id="dashboard-email"></p>
                        </div>

                        <!-- Name -->
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-person me-2"></i>Name</p>
                            <form>
                                <div class="mb-3">
                                    <input dir="auto" type="text"
                                        class="form-control form-control-sm rounded-4 shadow-sm" id="form-name"
                                        minlength="2" maxlength="50" name="form-name"
                                        oninput="undangan.admin.enableButtonName()" autocomplete="name"
                                        data-offline-disabled="false">
                                </div>
                            </form>

                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn btn-sm btn-primary rounded-4 shadow-sm"
                                    id="button-change-name" onclick="undangan.admin.changeName(this)" disabled
                                    data-offline-disabled="false">Change</button>
                            </div>
                        </div>

                        <!-- Access Key -->
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-key me-2"></i>Access Key</p>

                            <div class="input-group input-group-sm mb-3">
                                <input type="text" class="form-control form-control-sm rounded-start-4 shadow-sm"
                                    id="dashboard-accesskey" placeholder="Regenerate key" readonly>
                                <button class="btn btn-sm btn-outline-secondary rounded-end-4 shadow-sm" type="button"
                                    data-copy="" onclick="undangan.util.copy(this)" id="button-copy-accesskey"><i
                                        class="fa-solid fa-copy"></i></button>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn btn-sm btn-primary rounded-4 shadow-sm"
                                    onclick="undangan.admin.regenerate(this)"
                                    data-offline-disabled="false">Regenerate</button>
                            </div>
                        </div>

                        <!-- Time Zone -->
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-location-dot me-2"></i>Time Zone
                            </p>
                            <form>
                                <div class="position-relative mb-3">
                                    <input type="text" class="form-control form-control-sm rounded-4 shadow-sm"
                                        id="form-timezone" oninput="undangan.admin.openLists(this, this.value)"
                                        onclick="undangan.admin.openLists(this)" autocomplete="off"
                                        data-offline-disabled="false">
                                    <div id="dropdown-tz-list"
                                        class="d-none list-group position-absolute w-100 shadow-sm rounded-4 overflow-y-scroll z-3"
                                        style="max-height: 15rem;"></div>
                                </div>
                            </form>

                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn btn-sm btn-primary rounded-4 shadow-sm"
                                    id="button-timezone" onclick="undangan.admin.changeTz(this)" disabled
                                    data-offline-disabled="false">Change</button>
                            </div>
                        </div>

                        <!-- Tenor Key -->
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-photo-film me-2"></i>Tenor Key
                            </p>

                            <div class="input-group input-group-sm mb-3">
                                <input type="text" class="form-control form-control-sm rounded-start-4 shadow-sm"
                                    id="dashboard-tenorkey" placeholder="Api key tenor" autocomplete="off">
                                <button class="btn btn-sm btn-outline-secondary rounded-end-4 shadow-sm" type="button"
                                    onclick="document.getElementById('dashboard-tenorkey').value = null"><i
                                        class="fa-solid fa-trash-can"></i></button>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn btn-sm btn-primary rounded-4 shadow-sm"
                                    onclick="undangan.admin.tenor(this)" data-offline-disabled="false">Save</button>
                            </div>
                        </div>

                        <!-- Toggle -->
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-sliders me-2"></i>Control</p>

                            <div class="form-check form-switch mb-1">
                                <input class="form-check-input shadow-sm" style="cursor:pointer;" type="checkbox"
                                    role="switch" id="filterBadWord"
                                    onchange="undangan.admin.changeCheckboxValue(this, 'filter')"
                                    data-offline-disabled="false">
                                <label class="form-check-label" style="cursor:pointer;" for="filterBadWord">Filter bad
                                    word</label>
                            </div>
                            <div class="form-check form-switch mb-1">
                                <input class="form-check-input shadow-sm" style="cursor:pointer;" type="checkbox"
                                    role="switch" id="confettiAnimation"
                                    onchange="undangan.admin.changeCheckboxValue(this, 'confetti_animation')"
                                    data-offline-disabled="false">
                                <label class="form-check-label" style="cursor:pointer;" for="confettiAnimation">Confetti
                                    animation</label>
                            </div>
                            <div class="form-check form-switch mb-1">
                                <input class="form-check-input shadow-sm" style="cursor:pointer;" type="checkbox"
                                    role="switch" id="replyComment"
                                    onchange="undangan.admin.changeCheckboxValue(this, 'can_reply')"
                                    data-offline-disabled="false">
                                <label class="form-check-label" style="cursor:pointer;" for="replyComment">Can
                                    reply</label>
                            </div>
                            <div class="form-check form-switch mb-1">
                                <input class="form-check-input shadow-sm" style="cursor:pointer;" type="checkbox"
                                    role="switch" id="editComment"
                                    onchange="undangan.admin.changeCheckboxValue(this, 'can_edit')"
                                    data-offline-disabled="false">
                                <label class="form-check-label" style="cursor:pointer;" for="editComment">Can
                                    edit</label>
                            </div>
                            <div class="form-check form-switch mb-1">
                                <input class="form-check-input shadow-sm" style="cursor:pointer;" type="checkbox"
                                    role="switch" id="deleteComment"
                                    onchange="undangan.admin.changeCheckboxValue(this, 'can_delete')"
                                    data-offline-disabled="false">
                                <label class="form-check-label" style="cursor:pointer;" for="deleteComment">Can
                                    delete</label>
                            </div>
                        </div>

                        <!-- Change Password -->
                        <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-lock me-2"></i>Change Password
                            </p>
                            <form>
                                <input hidden type="text" name="username" autocomplete="username" value="...">
                                <div class="my-2">
                                    <input type="password" class="form-control form-control-sm rounded-4 shadow-sm"
                                        id="old_password" minlength="8" maxlength="20" name="old_password"
                                        placeholder="Old Password" autocomplete="current-password"
                                        data-offline-disabled="false">
                                </div>
                                <div class="mb-3">
                                    <input type="password" class="form-control form-control-sm rounded-4 shadow-sm"
                                        id="new_password" minlength="8" maxlength="20" name="new_password"
                                        oninput="undangan.admin.enableButtonPassword()" placeholder="New Password"
                                        autocomplete="new-password" data-offline-disabled="false">
                                </div>
                            </form>

                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn btn-sm btn-primary rounded-4 shadow-sm"
                                    id="button-change-password" onclick="undangan.admin.changePassword(this)" disabled
                                    data-offline-disabled="false">Change</button>
                            </div>
                        </div>

                        <!-- Logout -->
                        <div class="d-block d-md-none d-lg-none d-xl-none">
                            <div class="p-3 bg-theme-auto mb-3 rounded-4 shadow">
                                <button type="button"
                                    class="btn btn-danger btn-sm w-100 text-center fw-semibold rounded-4 shadow-sm"
                                    onclick="undangan.admin.logout()">
                                    <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
                                </button>
                            </div>
                        </div>

                        <div class="p-3 bg-theme-auto mb-4 rounded-4 shadow">
                            <p class="mx-0 mt-0 mb-1 p-0 fw-bold"><i class="fa-solid fa-heart me-2"></i>Love Project</p>
                            <p class="m-0 p-0">Discover and support this project on <i
                                    class="fa-brands fa-github me-1"></i><a target="_blank"
                                    href="https://github.com/dewanakl/undangan">GitHub</a></p>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal login -->
    <div class="modal fade" id="mainModal" data-bs-backdrop="static" data-bs-keyboard="false" aria-label="modal login"
        tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label my-1"><i
                                    class="fa-solid fa-envelope me-2"></i>Email</label>
                            <input type="email" class="form-control shadow-sm rounded-4" id="loginEmail" minlength="5"
                                maxlength="254" placeholder="Enter your email" required autocomplete="email"
                                data-offline-disabled="false">
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label my-1"><i
                                    class="fa-solid fa-lock me-2"></i>Password</label>
                            <input type="password" class="form-control shadow-sm rounded-4" id="loginPassword"
                                minlength="8" maxlength="20" placeholder="Enter your password" required
                                autocomplete="current-password" data-offline-disabled="false">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary shadow-sm rounded-4"
                                onclick="undangan.admin.auth.login(this)" data-offline-disabled="false"><i
                                    class="fa-solid fa-right-to-bracket me-2"></i>Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
